<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LakeScope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        --bg: #070b10;
        --surface: #0d1117;
        --surface2: #161b22;
        --surface3: #1e242c;
        --border: rgba(255,255,255,0.07);
        --border2: rgba(255,255,255,0.12);
        --text: #e2e8f0;
        --muted: #64748b;
        --muted2: #94a3b8;
        --green: #4ade80;
        --green-dim: rgba(74,222,128,0.12);
        --teal: #2dd4bf;
        --teal-dim: rgba(45,212,191,0.12);
        --blue: #60a5fa;
        --blue-dim: rgba(96,165,250,0.12);
        --amber: #fbbf24;
        --amber-dim: rgba(251,191,36,0.12);
        --red: #f87171;
        --red-dim: rgba(248,113,113,0.12);
        --purple: #a78bfa;
        --purple-dim: rgba(167,139,250,0.12);
        --gray-dim: rgba(255,255,255,0.06);
        --gradient-accent: linear-gradient(135deg, #2dd4bf, #60a5fa);
        --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
        --shadow-glow-teal: 0 0 20px rgba(45,212,191,0.2);
        --shadow-glow-green: 0 0 20px rgba(74,222,128,0.2);
        --shadow-glow-red: 0 0 20px rgba(248,113,113,0.2);
        --shadow-glow-amber: 0 0 20px rgba(251,191,36,0.2);
        --radius: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
      }
      html, body, #root { height: 100%; }
      body {
        background:
          radial-gradient(ellipse 60% 40% at 0% 0%, rgba(45,212,191,0.04) 0%, transparent 60%),
          radial-gradient(ellipse 60% 40% at 100% 0%, rgba(96,165,250,0.04) 0%, transparent 60%),
          #070b10;
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--surface); }
      ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
      button { transition: all 0.15s ease; }
      button:active:not(:disabled) { transform: scale(0.97); }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .animate-in { animation: fadeIn 0.25s ease forwards; }
      *:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; border-radius: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
